services:
  postgres:
    image: postgres:16-alpine
    container_name: kaneo-postgres
    env_file:
      - .env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaneo -d kaneo"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/usekaneo/api:latest
    container_name: kaneo-api
    env_file:
      - .env
    ports:
      - ${LAN_IP}:1337:1337
      - ${TAILSCALE_IP}:1337:1337
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/usekaneo/web:latest
    container_name: kaneo-web
    env_file:
      - .env
    ports:
      - ${LAN_IP}:5173:5173
      - ${TAILSCALE_IP}:5173:5173
    depends_on:
      - api
    restart: unless-stopped
