services:
  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=${TZ}
    ports:
      - ${LAN_IP}:8081:8081
      - ${TAILSCALE_IP}:8081:8081
    volumes:
      - ${METUBE_DOWNLOADS_DIR}:/downloads
